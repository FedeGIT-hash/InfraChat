<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InfraChat · Mensajes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="/styles.css" />
</head>

<body>
  <div class="viewport">
    <section class="app" aria-label="Chat">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <div class="logo">I</div>
          <div class="logo-text">
            <h1>InfraChat</h1>
            <p id="meLine">Conectando…</p>
          </div>
          <button class="icon-btn mobile-only" id="closeSidebarBtn" type="button" aria-label="Cerrar menú">✕</button>
        </div>

        <div class="search-bar search-add">
          <input id="userSearch" type="text" placeholder="Buscar username exacto…" />
          <button class="icon-btn" id="searchUserBtn" type="button" aria-label="Buscar">⌕</button>
        </div>

        <div class="list-group">
          <div class="list-title">Resultado</div>
          <div class="contacts" id="searchResult" aria-label="Resultado búsqueda"></div>
        </div>

        <div class="list-group">
          <div class="list-title">Solicitudes</div>
          <div class="contacts" id="requestsList" aria-label="Solicitudes"></div>
        </div>

        <div class="list-group">
          <div class="list-title">Amigos</div>
          <div class="contacts" id="friendsList" aria-label="Amigos"></div>
        </div>
      </aside>

      <main class="chat-area">
        <div class="chat-header">
          <button class="icon-btn mobile-only" id="openSidebarBtn" type="button" aria-label="Abrir menú">☰</button>
          <div class="avatar online" id="roomAvatar">G</div>
          <div class="chat-header-info">
            <div class="name" id="roomName">General</div>
            <div class="status" id="roomStatus">Conectado</div>
            <div class="sub" id="chatSubline"></div>
          </div>
          <div class="chat-header-actions">
            <a class="pill" id="profileBtn" href="/perfil.html">Perfil</a>
            <button class="icon-btn" id="callBtn" type="button" aria-label="Llamar">📞</button>
            <button class="pill" id="signOutBtn" type="button">Salir</button>
          </div>
        </div>

        <div class="messages" id="messages" aria-label="Mensajes"></div>
        <div class="typing-indicator hidden" id="typingIndicator" aria-live="polite"></div>

        <form class="chat-input" id="sendForm">
          <div class="input-wrap">
            <textarea id="msgInput" rows="1" placeholder="Escribe un mensaje…" maxlength="1000"></textarea>
          </div>
          <button class="send-btn" id="sendBtn" type="submit" title="Enviar">➤</button>
        </form>
      </main>
    </section>
  </div>

  <div class="call-overlay hidden" id="callOverlay" aria-live="polite">
    <div class="call-card">
      <div class="call-top">
        <div class="avatar big" id="callAvatar">?</div>
        <div class="call-meta">
          <div class="call-title" id="callTitle">Llamada</div>
          <div class="call-sub" id="callSub">Conectando…</div>
        </div>
      </div>

      <div class="call-actions">
        <button class="btn primary hidden" id="callAcceptBtn" type="button">Aceptar</button>
        <button class="btn hidden" id="callRejectBtn" type="button">Rechazar</button>
        <button class="btn primary hidden" id="callHangBtn" type="button">Colgar</button>
        <button class="btn hidden" id="callMuteBtn" type="button">Silenciar</button>
      </div>
      <p class="hint" id="callHint"></p>
    </div>
  </div>

  <audio id="remoteAudio" autoplay playsinline></audio>

  <script type="module" src="/mensajes.js"></script>
</body>

</html>
